name: Release gates

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run Rust tests
        run: cargo test --workspace --all-features

  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install PulseOn and test dependencies
        run: uv sync --group testing-extra --group linting
      - name: Type-check Python
        run: uv run pyright
      - name: Run Python tests
        run: uv run pytest

  minio:
    name: MinIO/S3 acceptance
    runs-on: ubuntu-latest
    env:
      PULSEON_MINIO_ENDPOINT: localhost:9000
      PULSEON_MINIO_BUCKET: pulseon-ci
      PULSEON_MINIO_ACCESS_KEY_ID: pulseon-ci
      PULSEON_MINIO_SECRET_ACCESS_KEY: pulseon-ci-secret
      PULSEON_MINIO_REGION: us-east-1
      PULSEON_MINIO_USE_SSL: "false"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install PulseOn and test dependencies
        run: uv sync --group testing-extra
      - name: Start MinIO
        run: |
          docker run --detach --name pulseon-minio \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER="$PULSEON_MINIO_ACCESS_KEY_ID" \
            --env MINIO_ROOT_PASSWORD="$PULSEON_MINIO_SECRET_ACCESS_KEY" \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data
          for attempt in {1..30}; do
            if curl --fail --silent \
              http://localhost:9000/minio/health/ready > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs pulseon-minio
          exit 1
      - name: Install MinIO client and create bucket
        run: |
          sudo curl --fail --silent --show-error \
            --output /usr/local/bin/mc \
            https://dl.min.io/client/mc/release/linux-amd64/archive/mc.RELEASE.2025-08-13T08-35-41Z
          sudo chmod +x /usr/local/bin/mc
          mc alias set pulseon \
            http://localhost:9000 \
            "$PULSEON_MINIO_ACCESS_KEY_ID" \
            "$PULSEON_MINIO_SECRET_ACCESS_KEY"
          mc mb "pulseon/$PULSEON_MINIO_BUCKET"
      - name: Run S3 acceptance for both catalog backends
        run: uv run pytest tests/test_minio_acceptance.py
      - name: Run read-amplification gate for both catalog backends
        run: uv run python scripts/bench_minio_metric_query.py

  wheel-smoke:
    name: Wheel smoke (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64
            manylinux: manylinux_2_28
          - name: macos-x86_64
            runner: macos-15-intel
            target: x86_64
            manylinux: ""
          - name: macos-aarch64
            runner: macos-latest
            target: aarch64
            manylinux: ""
          - name: windows-x64
            runner: windows-latest
            target: x64
            manylinux: ""
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          manylinux: ${{ matrix.platform.manylinux }}
          sccache: true
      - name: Install built wheel
        run: >-
          python -c "import glob, subprocess, sys;
          wheels = glob.glob('dist/*.whl');
          assert len(wheels) == 1, wheels;
          subprocess.check_call([sys.executable, '-m', 'pip', 'install',
          '--force-reinstall', *wheels])"
      - name: Run installed-package smoke test
        run: python scripts/wheel_smoke.py
      - name: Upload verified wheel
        uses: actions/upload-artifact@v6
        with:
          name: verified-wheel-${{ matrix.platform.name }}
          path: dist/*.whl
