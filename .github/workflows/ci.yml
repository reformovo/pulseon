# Initially generated by maturin v1.13.3 and maintained for PulseOn CI and releases.
# Do not replace its release dependency graph with raw generate-ci output.
name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run Rust tests
        run: cargo test --workspace --all-features

  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install PulseOn and test dependencies
        run: uv sync --group testing-extra --group linting
      - name: Type-check Python
        run: uv run pyright
      - name: Run Python tests
        run: uv run pytest

  minio:
    name: MinIO/S3 acceptance
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: [linux]
    runs-on: ubuntu-latest
    env:
      PULSEON_MINIO_ENDPOINT: localhost:9000
      PULSEON_MINIO_BUCKET: pulseon-ci
      PULSEON_MINIO_ACCESS_KEY_ID: pulseon-ci
      PULSEON_MINIO_SECRET_ACCESS_KEY: pulseon-ci-secret
      PULSEON_MINIO_REGION: us-east-1
      PULSEON_MINIO_USE_SSL: "false"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Download built wheel
        uses: actions/download-artifact@v7
        with:
          name: wheels-linux-x86_64
          path: dist
      - name: Install built wheel and test dependencies
        run: uv pip install --system pytest dist/*.whl
      - name: Start MinIO
        run: |
          docker run --detach --name pulseon-minio \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER="$PULSEON_MINIO_ACCESS_KEY_ID" \
            --env MINIO_ROOT_PASSWORD="$PULSEON_MINIO_SECRET_ACCESS_KEY" \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data
          for attempt in {1..30}; do
            if curl --fail --silent \
              http://localhost:9000/minio/health/ready > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs pulseon-minio
          exit 1
      - name: Install MinIO client and create bucket
        run: |
          sudo curl --fail --silent --show-error \
            --output /usr/local/bin/mc \
            https://dl.min.io/client/mc/release/linux-amd64/archive/mc.RELEASE.2025-08-13T08-35-41Z
          sudo chmod +x /usr/local/bin/mc
          mc alias set pulseon \
            http://localhost:9000 \
            "$PULSEON_MINIO_ACCESS_KEY_ID" \
            "$PULSEON_MINIO_SECRET_ACCESS_KEY"
          mc mb "pulseon/$PULSEON_MINIO_BUCKET"
      - name: Run S3 acceptance for both catalog backends
        run: python -m pytest tests/test_minio_acceptance.py
      - name: Run local acceptance for both catalog backends
        run: python -m pytest tests/test_catalog_backend_parity.py
      - name: Run read-amplification gate for both catalog backends
        run: python scripts/bench_minio_metric_query.py
      - name: Validate online and offline LTTB paths from the wheel
        run: python scripts/rc_lttb_validation.py

  linux:
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: manylinux_2_28
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Install and smoke test sdist
        run: |
          python -m venv .sdist-venv
          .sdist-venv/bin/python -m pip install dist/*.tar.gz
          .sdist-venv/bin/python scripts/wheel_smoke.py
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  wheel-smoke:
    name: Wheel smoke (${{ matrix.platform.name }})
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: [linux, windows, macos]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            runner: ubuntu-22.04
            artifact: wheels-linux-x86_64
          - name: macos-x86_64
            runner: macos-15-intel
            artifact: wheels-macos-x86_64
          - name: macos-aarch64
            runner: macos-latest
            artifact: wheels-macos-aarch64
          - name: windows-x64
            runner: windows-latest
            artifact: wheels-windows-x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Download built wheel
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.platform.artifact }}
          path: dist
      - name: Install built wheel
        run: >-
          python -c "import glob, subprocess, sys;
          wheels = glob.glob('dist/*.whl');
          assert len(wheels) == 1, wheels;
          subprocess.check_call([sys.executable, '-m', 'pip', 'install',
          '--force-reinstall', *wheels])"
      - name: Run installed-package smoke test
        run: python scripts/wheel_smoke.py

  check:
    name: Required checks
    if: always()
    needs: [rust, python]
    runs-on: ubuntu-latest
    steps:
      - name: Require successful quality jobs
        run: |
          test "${{ needs.rust.result }}" = "success"
          test "${{ needs.python.result }}" = "success"

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [check, minio, linux, musllinux, windows, macos, sdist, wheel-smoke]
    environment: release
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v7
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "wheels-*/*"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always 'wheels-*/*'
